<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1816;
            --bg-deep: #141210;
            --surface: #2a2622;
            --surface-light: #3a3530;
            --text: #d4c5b5;
            --text-dim: #7a6f64;
            --text-muted: #5a5048;
            --accent: #b8a088;
            --accent-bright: #d4b896;
            --green: #8a9a7b;
            --green-bright: #a8b898;
            --warm: #c4956a;
            --cool: #7a8a9a;
            --border: #3a3530;
            --border-light: #4a4540;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text);
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .app { display: flex; flex-direction: column; height: 100vh; }

        .statusbar {
            display: flex; align-items: center; padding: 0 12px; height: 24px;
            background: var(--bg-deep); border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted); gap: 8px; user-select: none;
        }

        .statusbar .mode { color: var(--accent); font-weight: 500; }
        .statusbar .sep { color: var(--border-light); }
        .statusbar .right { margin-left: auto; display: flex; gap: 12px; }
        .statusbar .state { color: var(--green); }

        .main { flex: 1; display: flex; overflow: hidden; }

        .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .messages { flex: 1; overflow-y: auto; padding: 4px 0; }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .ascii-area {
            padding: 4px 16px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
            position: relative;
            overflow: hidden;
            transition: min-height 0.3s, padding 0.3s;
        }

        .ascii-area.hidden {
            min-height: 0;
            padding: 0 16px;
            border-bottom: none;
        }

        .ascii-area.hidden .ascii-art,
        .ascii-area.hidden .ascii-label {
            display: none;
        }

        .ascii-art {
            white-space: pre;
            font-size: 10px;
            line-height: 1.15;
            color: var(--text-dim);
            text-align: center;
            transition: color 0.8s ease;
        }

        .ascii-art.talking { color: var(--green); }
        .ascii-art.thinking { color: var(--accent); }
        .ascii-art.idle { color: var(--text-muted); }

        .ascii-label {
            position: absolute;
            bottom: 4px;
            right: 12px;
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .msg { padding: 3px 16px; line-height: 1.5; }
        .msg:hover { background: rgba(255,255,255,0.015); }
        .msg-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1px; }
        .msg-role { font-weight: 500; font-size: 11px; min-width: 50px; }
        .role-user { color: var(--warm); }
        .role-ai { color: var(--accent-bright); }
        .role-sys { color: var(--green); }
        .msg-time { color: var(--text-muted); font-size: 10px; }
        .msg-body { color: var(--text); padding-left: 56px; white-space: pre-wrap; word-break: break-word; }
        .msg-body.user-body { color: var(--text); }

        .cursor-blink {
            display: inline-block; width: 6px; height: 13px; background: var(--accent);
            animation: blink 1.2s step-end infinite; vertical-align: text-bottom; margin-left: 1px;
        }

        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        .thinking-inline { padding-left: 56px; color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .log-ok { color: var(--green); }
        .log-info { color: var(--accent); }

        .audio-ctrl { display: inline-flex; align-items: center; gap: 1px; margin-left: 6px; vertical-align: middle; }
        .audio-btn {
            background: none; border: none; color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            padding: 1px 4px; cursor: pointer; transition: color 0.1s;
        }
        .audio-btn:hover { color: var(--text); }
        .badge { color: var(--green); font-size: 10px; margin-left: 4px; }

        .input-area { border-top: 1px solid var(--border); padding: 6px 12px; background: var(--bg-deep); }
        .input-row { display: flex; align-items: flex-end; gap: 8px; }
        .input-prompt { color: var(--green); font-weight: 500; font-size: 12px; padding-top: 6px; }
        .textarea-wrap { flex: 1; }
        .input-field {
            width: 100%; background: var(--surface); border: 1px solid transparent;
            color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
            outline: none; caret-color: var(--accent); padding: 6px 8px; resize: none;
            overflow: hidden; line-height: 1.5; min-height: 32px; max-height: 160px;
        }
        .input-field:focus { border-color: var(--border-light); }
        .input-field::placeholder { color: var(--text-muted); }
        .input-field:disabled { color: var(--text-muted); }
        .input-actions { display: flex; align-items: center; gap: 6px; padding-top: 6px; }
        .input-hint { color: var(--text-muted); font-size: 10px; }
        .send-btn {
            background: var(--surface); border: 1px solid transparent; color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 12px;
            cursor: pointer; transition: all 0.1s;
        }
        .send-btn:hover { border-color: var(--green); color: var(--green); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .sidebar {
            width: 220px; background: var(--bg-deep); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-section { border-bottom: 1px solid var(--border); padding: 4px 0; }
        .sidebar-header {
            padding: 3px 10px; font-size: 10px; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-muted); display: flex; align-items: center;
            justify-content: space-between; cursor: pointer; user-select: none;
        }
        .sidebar-header:hover { color: var(--text-dim); }
        .sidebar-header .toggle { font-size: 9px; transition: transform 0.15s; }
        .sidebar-header.collapsed .toggle { transform: rotate(-90deg); }
        .sidebar-content { overflow: hidden; }
        .sidebar-content.collapsed { display: none; }
        .name-row { display: flex; align-items: center; gap: 4px; padding: 2px 10px; }
        .name-label { color: var(--text-muted); font-size: 11px; min-width: 28px; }
        .name-input {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--accent-bright); font-family: 'JetBrains Mono', monospace;
            font-size: 11px; padding: 2px 5px; outline: none;
        }
        .name-input:focus { border-color: var(--border-light); }
        .voice-list { padding: 0 10px; }
        .voice-item { display: grid; grid-template-columns: 28px 1fr; gap: 2px 4px; padding: 1px 0; align-items: baseline; }
        .voice-id { font-weight: 500; font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 1px 3px; }
        .voice-id:hover { color: var(--text); }
        .voice-id.active { color: var(--accent-bright); }
        .voice-name { font-size: 10px; color: var(--text-muted); }
        .voice-desc-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 3px; padding-left: 28px; }
        .voice-desc { font-size: 10px; color: var(--text-muted); flex: 1; }
        .voice-edit {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 9px; padding: 0 2px; opacity: 0; transition: opacity 0.1s;
        }
        .voice-item:hover .voice-edit { opacity: 1; }
        .voice-edit:hover { color: var(--accent); }
        .voice-desc-input {
            flex: 1; background: var(--surface); border: 1px solid var(--border-light);
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 10px; padding: 1px 4px; outline: none;
        }
        .theme-list { padding: 0 10px; }
        .theme-item {
            display: flex; align-items: center; gap: 6px; padding: 2px 3px;
            cursor: pointer; font-size: 11px; color: var(--text-muted);
        }
        .theme-item:hover { color: var(--text); }
        .theme-item.active { color: var(--accent-bright); }
        .theme-swatch { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--border); }
        .cfg-list { padding: 0 10px; }
        .cfg-row { display: flex; align-items: center; gap: 4px; padding: 1px 0; }
        .cfg-key { color: var(--text-muted); font-size: 11px; min-width: 60px; }
        .cfg-val {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 11px; padding: 2px 4px; outline: none; text-align: right;
        }
        .cfg-val:focus { border-color: var(--border-light); }
        .cfg-actions { display: flex; gap: 3px; padding: 3px 10px; }
        .cfg-btn {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
            font-size: 10px; padding: 2px 5px; cursor: pointer; transition: all 0.1s;
        }
        .cfg-btn:hover { border-color: var(--text-dim); color: var(--text); }
        .cfg-btn.danger:hover { border-color: var(--warm); color: var(--warm); }
        .boot { color: var(--text-muted); font-size: 11px; }
        .boot-line { padding: 0 16px; }
        .boot-ok { color: var(--green); }
        .boot-info { color: var(--accent); }
    </style>
    <style id="themeStyle"></style>
</head>
<body>
    <div class="app">
        <div class="statusbar">
            <span class="mode" id="sbMode">normal</span>
            <span class="sep">‚Ēā</span>
            <span id="sbName">jarvis</span>
            <span class="sep">‚Ēā</span>
            <span id="sbVoice">m1</span>
            <span class="sep">‚Ēā</span>
            <span id="sbConfig">8¬∑1.05</span>
            <div class="right">
                <span class="state" id="sbState">idle</span>
            </div>
        </div>

        <div class="main">
            <div class="chat">
                <div class="ascii-area" id="asciiArea">
                    <span class="ascii-label" id="asciiLabel">idle</span>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <div class="input-row">
                        <span class="input-prompt">‚ĚĮ</span>
                        <div class="textarea-wrap">
                            <textarea class="input-field" id="input" placeholder="..." rows="1"></textarea>
                        </div>
                        <div class="input-actions">
                            <span class="input-hint" id="hint">enter</span>
                            <button class="send-btn" id="sendBtn">send</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>name</span><span class="toggle">‚Ėĺ</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="name-row">
                            <span class="name-label">set</span>
                            <input class="name-input" id="nameInput" placeholder="name">
                        </div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>voices</span><span class="toggle">‚Ėĺ</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="voice-list" id="voiceList"></div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>theme</span><span class="toggle">‚Ėĺ</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="theme-list" id="themeList"></div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>config</span><span class="toggle">‚Ėĺ</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="cfg-list">
                            <div class="cfg-row"><span class="cfg-key">glyph</span><span class="cfg-val" id="cfgGlyph" style="cursor:pointer;text-align:center" onclick="toggleGlyph()">on</span></div>
                            <div class="cfg-row"><span class="cfg-key">lang</span><input class="cfg-val" id="cfgLang" value="en"></div>
                            <div class="cfg-row"><span class="cfg-key">steps</span><input class="cfg-val" id="cfgSteps" type="number" min="5" max="12" value="8"></div>
                            <div class="cfg-row"><span class="cfg-key">speed</span><input class="cfg-val" id="cfgSpeed" type="number" step="0.05" min="0.7" max="2.0" value="1.05"></div>
                            <div class="cfg-row"><span class="cfg-key">text_ms</span><input class="cfg-val" id="cfgTextSpeed" type="number" min="0" max="100" value="20"></div>
                        </div>
                        <div class="cfg-actions">
                            <button class="cfg-btn" id="btnSave">save</button>
                            <button class="cfg-btn danger" id="btnReset">reset</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        function time() { return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' }); }
        function scroll() { messages.scrollTop = messages.scrollHeight; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function toggleSection(header) {
            header.classList.toggle('collapsed');
            header.nextElementSibling.classList.toggle('collapsed');
        }

        function applyTheme(name) {
            const theme = THEMES[name];
            if (!theme) return;
            const css = Object.entries(theme.vars).map(([k, v]) => `${k}: ${v};`).join('\n');
            themeStyle.textContent = `:root { ${css} }`;
        }

        function updateStatusbar() {
            sbName.textContent = assistantName;
            sbVoice.textContent = cfg.voice;
            sbConfig.textContent = `${cfg.steps}¬∑${cfg.speed}`;
        }

        function toggleGlyph() {
            cfg.show_glyph = !cfg.show_glyph;
            applyGlyphState();
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ show_glyph: cfg.show_glyph })
            });
        }

        function applyGlyphState() {
            const area = document.getElementById('asciiArea');
            if (cfg.show_glyph) {
                area.classList.remove('hidden');
                cfgGlyph.textContent = 'on';
            } else {
                area.classList.add('hidden');
                cfgGlyph.textContent = 'off';
                stopAscii();
            }
        }

        function startAscii(type) {
            stopAscii();

            const frames = type === 'idle' ? ASCII_IDLE_FRAMES :
                           type === 'thinking' ? ASCII_THINKING_FRAMES :
                           ASCII_TALKING_FRAMES;

            const art = document.createElement('pre');
            art.className = 'ascii-art ' + type;
            asciiArea.innerHTML = '';
            asciiArea.appendChild(art);

            const label = document.createElement('span');
            label.className = 'ascii-label';
            label.textContent = type;
            asciiArea.appendChild(label);

            let i = 0;
            function render() {
                art.textContent = frames[i % frames.length];
                i++;
            }
            render();
            const speed = type === 'talking' ? 100 : type === 'thinking' ? 200 : 400;
            asciiInterval = setInterval(render, speed);
        }

        function stopAscii() {
            if (asciiInterval) { clearInterval(asciiInterval); asciiInterval = null; }
        }

        function renderVoices() {
            voiceList.innerHTML = '';
            for (const [id, v] of Object.entries(voices)) {
                const item = document.createElement('div');
                item.className = 'voice-item';

                const idEl = document.createElement('span');
                idEl.className = 'voice-id' + (id === cfg.voice ? ' active' : '');
                idEl.textContent = id;
                idEl.addEventListener('click', () => setVoice(id));

                const nameEl = document.createElement('span');
                nameEl.className = 'voice-name';
                nameEl.textContent = v.name;

                const descRow = document.createElement('div');
                descRow.className = 'voice-desc-row';
                const descEl = document.createElement('span');
                descEl.className = 'voice-desc';
                descEl.textContent = v.desc;
                const editBtn = document.createElement('button');
                editBtn.className = 'voice-edit';
                editBtn.textContent = 'edit';
                editBtn.addEventListener('click', () => startEditDesc(id, descRow, descEl, v.desc));

                descRow.appendChild(descEl);
                descRow.appendChild(editBtn);
                item.appendChild(idEl);
                item.appendChild(nameEl);
                item.appendChild(descRow);
                voiceList.appendChild(item);
            }
        }

        function startEditDesc(id, row, descEl, current) {
            const existing = row.querySelector('.voice-desc-input');
            if (existing) return;
            const inp = document.createElement('input');
            inp.className = 'voice-desc-input';
            inp.value = current;
            descEl.replaceWith(inp);
            inp.focus();
            inp.select();
            const save = () => {
                const val = inp.value.trim() || current;
                voices[id].desc = val;
                fetch(`/api/voice/${id}/desc`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ desc: val })
                });
                renderVoices();
            };
            inp.addEventListener('blur', save);
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') inp.blur();
                if (e.key === 'Escape') renderVoices();
            });
        }

        function renderThemes() {
            themeList.innerHTML = '';
            for (const [id, t] of Object.entries(THEMES)) {
                const item = document.createElement('div');
                item.className = 'theme-item' + (id === cfg.theme ? ' active' : '');
                item.innerHTML = `<span class="theme-swatch" style="background:${t.swatch}"></span><span>${t.label}</span>`;
                item.addEventListener('click', () => setTheme(id));
                themeList.appendChild(item);
            }
        }

        async function setTheme(id) {
            cfg.theme = id;
            applyTheme(id);
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: id })
            });
            renderThemes();
        }

        async function setVoice(id) {
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ voice: id })
            });
            await loadConfig();
            addSys(`voice ‚Üí ${id}`);
        }

        async function loadConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            voices = data.voices;
            cfg = { ...data };
            delete cfg.voices;

            assistantName = (cfg.name || 'jarvis').toLowerCase();
            textSpeed = cfg.text_speed || 20;

            nameInput.value = cfg.name || 'jarvis';
            cfgLang.value = cfg.lang;
            cfgSteps.value = cfg.steps;
            cfgSpeed.value = cfg.speed;
            cfgTextSpeed.value = textSpeed;

            applyTheme(cfg.theme || 'wabisabi');
            updateStatusbar();
            applyGlyphState();
            renderVoices();
            renderThemes();
        }

        nameInput.addEventListener('blur', async () => {
            const name = nameInput.value.trim();
            if (!name || name.toLowerCase() === assistantName) { nameInput.value = cfg.name || 'jarvis'; return; }
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            assistantName = name.toLowerCase();
            cfg.name = name;
            updateStatusbar();
            addSys(`name ‚Üí ${name}`);
        });

        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });

        btnSave.addEventListener('click', async () => {
            const steps = parseInt(cfgSteps.value);
            const speed = parseFloat(cfgSpeed.value);
            const tSpeed = parseInt(cfgTextSpeed.value);
            if (steps < 5 || steps > 12) { cfgSteps.value = cfg.steps; return; }
            if (speed < 0.7 || speed > 2.0) { cfgSpeed.value = cfg.speed; return; }

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lang: cfgLang.value, steps, speed, text_speed: tSpeed })
            });
            await loadConfig();
            addSys('saved');
        });

        btnReset.addEventListener('click', async () => {
            await fetch('/api/config/reset', { method: 'POST' });
            await loadConfig();
            addSys('reset');
        });

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 160) + 'px';
        });

        async function boot() {
            await loadConfig();
            if (cfg.show_glyph) startAscii('idle');

            const lines = [
                { t: `  ${cfg.name || 'jarvis'} ¬∑ supertonic 3`, c: 'boot-info' },
                { t: `  voice:${cfg.voice} steps:${cfg.steps} speed:${cfg.speed}`, c: '' },
                { t: '', c: '' },
                { t: `  ready`, c: 'boot-ok' },
            ];

            for (const l of lines) {
                await new Promise(r => setTimeout(r, 120));
                const line = document.createElement('div');
                line.className = `boot-line ${l.c}`;
                line.textContent = l.t;
                messages.appendChild(line);
                scroll();
            }

            input.focus();
        }

        function addUser(text) {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-user">you</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="msg-body user-body">${esc(text)}</div>
            `;
            messages.appendChild(m);
            scroll();
        }

        function addSys(text) {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-sys">sys</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="msg-body" style="color:var(--green)">${esc(text)}</div>
            `;
            messages.appendChild(m);
            scroll();
        }

        function typeText(el, text) {
            return new Promise(resolve => {
                let i = 0;
                const cur = document.createElement('span');
                cur.className = 'cursor-blink';
                el.appendChild(cur);

                function type() {
                    if (i < text.length) {
                        el.insertBefore(document.createTextNode(text[i]), cur);
                        i++;
                        scroll();
                        setTimeout(type, textSpeed + Math.random() * (textSpeed * 0.5));
                    } else {
                        setTimeout(() => { cur.remove(); resolve(); }, 200);
                    }
                }
                type();
            });
        }

        function audioControls(audio) {
            const ctrls = document.createElement('span');
            ctrls.className = 'audio-ctrl';

            const playBtn = document.createElement('button');
            playBtn.className = 'audio-btn';
            playBtn.textContent = '‚Ė∂';
            playBtn.addEventListener('click', () => { audio.play(); });

            const pauseBtn = document.createElement('button');
            pauseBtn.className = 'audio-btn';
            pauseBtn.textContent = '‚Ěö‚Ěö';
            pauseBtn.addEventListener('click', () => { audio.pause(); });

            const stopBtn = document.createElement('button');
            stopBtn.className = 'audio-btn';
            stopBtn.textContent = '‚Ė†';
            stopBtn.addEventListener('click', () => { audio.pause(); audio.currentTime = 0; });

            ctrls.appendChild(playBtn);
            ctrls.appendChild(pauseBtn);
            ctrls.appendChild(stopBtn);
            return ctrls;
        }

        async function send() {
            const text = input.value.trim();
            if (!text || busy) return;

            busy = true;
            input.disabled = true;
            sendBtn.disabled = true;
            hint.textContent = '...';
            sbMode.textContent = 'processing';
            sbState.textContent = 'thinking';
            if (cfg.show_glyph) startAscii('thinking');

            addUser(text);
            input.value = '';
            input.style.height = 'auto';

            const thinkMsg = document.createElement('div');
            thinkMsg.className = 'msg';
            thinkMsg.id = 'thinking';
            thinkMsg.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-ai">${assistantName}</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="thinking-inline" id="thinkLog"></div>
            `;
            messages.appendChild(thinkMsg);
            scroll();

            const logs = [
                { t: `voice:${cfg.voice} steps:${cfg.steps}`, c: 'log-info', d: 100 },
                { t: 'synthesizing...', c: '', d: 200 },
            ];

            const logEl = document.getElementById('thinkLog');
            for (const l of logs) {
                await new Promise(r => setTimeout(r, l.d));
                const line = document.createElement('span');
                line.className = l.c;
                line.textContent = l.t + '  ';
                logEl.appendChild(line);
                scroll();
            }

            try {
                const res = await fetch('/api/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();

                if (data.error) {
                    thinkMsg.remove();
                    addSys(`error: ${data.error}`);
                    return;
                }

                thinkMsg.remove();

                const audio = new Audio(data.audio);
                audio.play();

                sbMode.textContent = 'speaking';
                sbState.textContent = 'talking';
                if (cfg.show_glyph) startAscii('talking');

                const m = document.createElement('div');
                m.className = 'msg';
                m.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-role role-ai">${assistantName}</span>
                        <span class="msg-time">${time()}</span>
                        <span class="badge">${data.duration.toFixed(1)}s</span>
                    </div>
                    <div class="msg-body"></div>
                `;
                messages.appendChild(m);
                scroll();

                const body = m.querySelector('.msg-body');
                const ctrls = audioControls(audio);
                body.appendChild(ctrls);
                audio.onended = () => {
                    sbMode.textContent = 'normal';
                    sbState.textContent = 'idle';
                    if (cfg.show_glyph) startAscii('idle');
                };

                typeText(body, text);

            } catch (err) {
                thinkMsg.remove();
                addSys(`error: ${err.message}`);
            } finally {
                busy = false;
                input.disabled = false;
                sendBtn.disabled = false;
                hint.textContent = 'enter';
                input.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        boot();
    </script>
</body>
</html>
