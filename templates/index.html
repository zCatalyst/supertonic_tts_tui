<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1e1e2e;
            --bg-dark: #181825;
            --surface: #313244;
            --surface-bright: #45475a;
            --text: #cdd6f4;
            --text-dim: #6c7086;
            --subtext: #585b70;
            --overlay: #7f849c;
            --blue: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
            --mauve: #cba6f7;
            --peach: #fab387;
            --yellow: #f9e2af;
            --teal: #94e2d5;
            --pink: #f5c2e7;
            --lavender: #b4befe;
            --border: #45475a;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            gap: 12px;
            min-height: 28px;
            user-select: none;
        }

        .topbar-name { color: var(--blue); font-weight: 600; }
        .topbar-sep { color: var(--subtext); }
        .topbar-status { margin-left: auto; display: flex; gap: 16px; }
        .topbar-status span { display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

        .main { flex: 1; display: flex; overflow: hidden; }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 3px; }

        .msg { padding: 4px 16px; line-height: 1.5; }
        .msg:hover { background: rgba(255,255,255,0.02); }

        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
        .msg-role { font-weight: 600; font-size: 12px; min-width: 60px; }
        .role-user { color: var(--peach); }
        .role-ai { color: var(--blue); }
        .role-sys { color: var(--green); }
        .msg-time { color: var(--subtext); font-size: 11px; }
        .msg-body { color: var(--text); padding-left: 68px; white-space: pre-wrap; word-break: break-word; }
        .msg-body.user-body { color: var(--text); }

        .cursor-blink {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: var(--blue);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 1px;
        }

        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        .thinking { padding-left: 68px; color: var(--text-dim); font-size: 12px; }
        .thinking-line { display: flex; align-items: center; gap: 6px; padding: 1px 0; }
        .thinking-spinner { display: inline-flex; gap: 2px; }
        .thinking-spinner span {
            width: 4px; height: 4px; background: var(--blue); border-radius: 50%;
            animation: spin 1.2s infinite;
        }
        .thinking-spinner span:nth-child(2) { animation-delay: 0.15s; }
        .thinking-spinner span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes spin { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.7); } 40% { opacity: 1; transform: scale(1); } }

        .log-line { opacity: 0; animation: fadein 0.2s forwards; }
        @keyframes fadein { to { opacity: 1; } }
        .log-ok { color: var(--green); }
        .log-info { color: var(--blue); }

        .wave { display: inline-flex; align-items: center; gap: 2px; height: 14px; margin-left: 8px; vertical-align: middle; }
        .wave i {
            display: block; width: 2px; background: var(--green); border-radius: 1px;
            animation: wave 1s ease-in-out infinite;
        }
        .wave i:nth-child(1) { animation-delay: 0s; height: 4px; }
        .wave i:nth-child(2) { animation-delay: 0.08s; height: 8px; }
        .wave i:nth-child(3) { animation-delay: 0.16s; height: 12px; }
        .wave i:nth-child(4) { animation-delay: 0.24s; height: 10px; }
        .wave i:nth-child(5) { animation-delay: 0.32s; height: 14px; }
        .wave i:nth-child(6) { animation-delay: 0.4s; height: 8px; }
        .wave i:nth-child(7) { animation-delay: 0.48s; height: 6px; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.4); opacity: 0.4; } 50% { transform: scaleY(1); opacity: 1; } }
        .wave.playing i { animation-play-state: running; }
        .wave.paused i { animation-play-state: paused; }

        /* Audio controls */
        .audio-controls {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .audio-btn {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 2px 6px;
            cursor: pointer;
            transition: all 0.1s;
            line-height: 1;
        }

        .audio-btn:hover { border-color: var(--text-dim); color: var(--text); }
        .audio-btn.active { color: var(--green); border-color: var(--green); }

        /* Input area */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 8px 12px;
            background: var(--bg-dark);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-prompt {
            color: var(--green);
            font-weight: 600;
            font-size: 13px;
            padding-top: 8px;
            line-height: 1.4;
        }

        .textarea-wrap {
            flex: 1;
            position: relative;
        }

        .input-field {
            width: 100%;
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            outline: none;
            caret-color: var(--blue);
            padding: 8px 10px;
            resize: none;
            overflow: hidden;
            line-height: 1.5;
            min-height: 38px;
            max-height: 200px;
            border-radius: 4px;
        }

        .input-field:focus { border-color: var(--blue); }
        .input-field::placeholder { color: var(--subtext); }
        .input-field:disabled { color: var(--subtext); }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-top: 8px;
        }

        .input-hint { color: var(--subtext); font-size: 11px; }

        .send-btn {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.1s;
            border-radius: 4px;
        }

        .send-btn:hover { border-color: var(--green); color: var(--green); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-dark);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section { border-bottom: 1px solid var(--border); padding: 6px 0; }
        .sidebar-header {
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .sidebar-header:hover { color: var(--text); }
        .sidebar-header .toggle { font-size: 10px; transition: transform 0.15s; }
        .sidebar-header.collapsed .toggle { transform: rotate(-90deg); }
        .sidebar-content { overflow: hidden; }
        .sidebar-content.collapsed { display: none; }

        .name-row { display: flex; align-items: center; gap: 6px; padding: 3px 12px; }
        .name-label { color: var(--text-dim); font-size: 12px; min-width: 36px; }
        .name-input {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--blue); font-family: 'JetBrains Mono', monospace;
            font-size: 12px; padding: 3px 6px; outline: none;
        }
        .name-input:focus { border-color: var(--blue); }

        .voice-list { padding: 0 12px; }
        .voice-item { display: grid; grid-template-columns: 32px 1fr; gap: 4px 6px; padding: 2px 0; align-items: baseline; }
        .voice-id {
            font-weight: 600; font-size: 12px; color: var(--text-dim); cursor: pointer;
            padding: 1px 4px; border-radius: 2px;
        }
        .voice-id:hover { background: var(--surface); color: var(--text); }
        .voice-id.active { color: var(--blue); background: rgba(137, 180, 250, 0.1); }
        .voice-name { font-size: 11px; color: var(--text-dim); }
        .voice-desc-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 4px; padding-left: 32px; }
        .voice-desc { font-size: 11px; color: var(--subtext); flex: 1; }
        .voice-edit {
            background: none; border: none; color: var(--subtext); cursor: pointer;
            font-size: 10px; padding: 0 2px; opacity: 0; transition: opacity 0.1s;
        }
        .voice-item:hover .voice-edit { opacity: 1; }
        .voice-edit:hover { color: var(--blue); }
        .voice-desc-input {
            flex: 1; background: var(--surface); border: 1px solid var(--blue);
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 11px; padding: 2px 4px; outline: none;
        }

        .cfg-list { padding: 0 12px; }
        .cfg-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
        .cfg-key { color: var(--text-dim); font-size: 12px; min-width: 70px; }
        .cfg-val {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 12px; padding: 2px 6px; outline: none; text-align: right;
        }
        .cfg-val:focus { border-color: var(--blue); }
        .cfg-actions { display: flex; gap: 4px; padding: 4px 12px; }
        .cfg-btn {
            flex: 1; background: var(--surface); border: 1px solid transparent;
            color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
            font-size: 11px; padding: 3px 6px; cursor: pointer; transition: all 0.1s;
        }
        .cfg-btn:hover { border-color: var(--text-dim); color: var(--text); }
        .cfg-btn.danger:hover { border-color: var(--red); color: var(--red); }

        .theme-list { padding: 0 12px; }
        .theme-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 4px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .theme-item:hover { background: var(--surface); color: var(--text); }
        .theme-item.active { color: var(--blue); }
        .theme-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }
        .theme-item.active .theme-dot { border-color: var(--blue); }

        .badge { display: inline-block; color: var(--green); font-size: 11px; margin-left: 6px; }

        .boot { color: var(--text-dim); font-size: 12px; }
        .boot-line { opacity: 0; animation: fadein 0.15s forwards; padding: 0 16px; }
        .boot-ok { color: var(--green); }
        .boot-info { color: var(--blue); }
    </style>
    <style id="themeStyle"></style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <span class="topbar-name" id="topbarName">JARVIS</span>
            <span class="topbar-sep">·</span>
            <span id="topbarVoice">M1</span>
            <span class="topbar-sep">·</span>
            <span id="topbarConfig">steps:8 speed:1.05</span>
            <div class="topbar-status">
                <span><span class="status-dot"></span> ready</span>
            </div>
        </div>

        <div class="main">
            <div class="chat">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <div class="input-row">
                        <span class="input-prompt">❯</span>
                        <div class="textarea-wrap">
                            <textarea class="input-field" id="input" placeholder="send a message..." rows="1"></textarea>
                        </div>
                        <div class="input-actions">
                            <span class="input-hint" id="hint">enter to send</span>
                            <button class="send-btn" id="sendBtn">send</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>name</span>
                        <span class="toggle">▾</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="name-row">
                            <span class="name-label">set</span>
                            <input class="name-input" id="nameInput" placeholder="assistant name">
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>voices</span>
                        <span class="toggle">▾</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="voice-list" id="voiceList"></div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>theme</span>
                        <span class="toggle">▾</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="theme-list" id="themeList"></div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-header" onclick="toggleSection(this)">
                        <span>config</span>
                        <span class="toggle">▾</span>
                    </div>
                    <div class="sidebar-content">
                        <div class="cfg-list">
                            <div class="cfg-row">
                                <span class="cfg-key">lang</span>
                                <input class="cfg-val" id="cfgLang" value="en">
                            </div>
                            <div class="cfg-row">
                                <span class="cfg-key">steps</span>
                                <input class="cfg-val" id="cfgSteps" type="number" min="5" max="12" value="8">
                            </div>
                            <div class="cfg-row">
                                <span class="cfg-key">speed</span>
                                <input class="cfg-val" id="cfgSpeed" type="number" step="0.05" min="0.7" max="2.0" value="1.05">
                            </div>
                            <div class="cfg-row">
                                <span class="cfg-key">text_speed</span>
                                <input class="cfg-val" id="cfgTextSpeed" type="number" min="0" max="100" value="20">
                            </div>
                        </div>
                        <div class="cfg-actions">
                            <button class="cfg-btn" id="btnSave">save</button>
                            <button class="cfg-btn danger" id="btnReset">reset</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const THEMES = {
            catppuccin: {
                label: 'Catppuccin',
                dot: '#cba6f7',
                vars: {
                    '--bg': '#1e1e2e', '--bg-dark': '#181825', '--surface': '#313244',
                    '--surface-bright': '#45475a', '--text': '#cdd6f4', '--text-dim': '#6c7086',
                    '--subtext': '#585b70', '--overlay': '#7f849c', '--blue': '#89b4fa',
                    '--green': '#a6e3a1', '--red': '#f38ba8', '--mauve': '#cba6f7',
                    '--peach': '#fab387', '--yellow': '#f9e2af', '--teal': '#94e2d5',
                    '--pink': '#f5c2e7', '--lavender': '#b4befe', '--border': '#45475a',
                }
            },
            matrix: {
                label: 'Matrix',
                dot: '#00ff41',
                vars: {
                    '--bg': '#0a0a0a', '--bg-dark': '#0d0d0d', '--surface': '#1a1a1a',
                    '--surface-bright': '#2a2a2a', '--text': '#00ff41', '--text-dim': '#008020',
                    '--subtext': '#004410', '--overlay': '#006622', '--blue': '#00ff41',
                    '--green': '#00ff41', '--red': '#ff3333', '--mauve': '#00cc33',
                    '--peach': '#00cc33', '--yellow': '#00ff41', '--teal': '#00ff41',
                    '--pink': '#00cc33', '--lavender': '#00cc33', '--border': '#1a3a1a',
                }
            },
            monokai: {
                label: 'Monokai',
                dot: '#e6db74',
                vars: {
                    '--bg': '#272822', '--bg-dark': '#1e1f1c', '--surface': '#3e3d32',
                    '--surface-bright': '#49483e', '--text': '#f8f8f2', '--text-dim': '#75715e',
                    '--subtext': '#5a5a5a', '--overlay': '#808080', '--blue': '#66d9ef',
                    '--green': '#a6e22e', '--red': '#f92672', '--mauve': '#ae81ff',
                    '--peach': '#fd971f', '--yellow': '#e6db74', '--teal': '#a1efe4',
                    '--pink': '#f92672', '--lavender': '#ae81ff', '--border': '#49483e',
                }
            },
            nord: {
                label: 'Nord',
                dot: '#88c0d0',
                vars: {
                    '--bg': '#2e3440', '--bg-dark': '#272c36', '--surface': '#3b4252',
                    '--surface-bright': '#434c5e', '--text': '#eceff4', '--text-dim': '#4c566a',
                    '--subtext': '#434c5e', '--overlay': '#d8dee9', '--blue': '#88c0d0',
                    '--green': '#a3be8c', '--red': '#bf616a', '--mauve': '#b48ead',
                    '--peach': '#d08770', '--yellow': '#ebcb8b', '--teal': '#8fbcbb',
                    '--pink': '#b48ead', '--lavender': '#81a1c1', '--border': '#434c5e',
                }
            },
            dracula: {
                label: 'Dracula',
                dot: '#bd93f9',
                vars: {
                    '--bg': '#282a36', '--bg-dark': '#21222c', '--surface': '#44475a',
                    '--surface-bright': '#565970', '--text': '#f8f8f2', '--text-dim': '#6272a4',
                    '--subtext': '#505570', '--overlay': '#808090', '--blue': '#8be9fd',
                    '--green': '#50fa7b', '--red': '#ff5555', '--mauve': '#bd93f9',
                    '--peach': '#ffb86c', '--yellow': '#f1fa8c', '--teal': '#8be9fd',
                    '--pink': '#ff79c6', '--lavender': '#bd93f9', '--border': '#44475a',
                }
            },
            gruvbox: {
                label: 'Gruvbox',
                dot: '#fabd2f',
                vars: {
                    '--bg': '#282828', '--bg-dark': '#1d2021', '--surface': '#3c3836',
                    '--surface-bright': '#504945', '--text': '#ebdbb2', '--text-dim': '#928374',
                    '--subtext': '#665c54', '--overlay': '#a89984', '--blue': '#83a598',
                    '--green': '#b8bb26', '--red': '#fb4934', '--mauve': '#d3869b',
                    '--peach': '#fe8019', '--yellow': '#fabd2f', '--teal': '#8ec07c',
                    '--pink': '#d3869b', '--lavender': '#83a598', '--border': '#504945',
                }
            },
            tokyo: {
                label: 'Tokyo Night',
                dot: '#7aa2f7',
                vars: {
                    '--bg': '#1a1b26', '--bg-dark': '#16161e', '--surface': '#24283b',
                    '--surface-bright': '#343b58', '--text': '#c0caf5', '--text-dim': '#565f89',
                    '--subtext': '#414868', '--overlay': '#787c99', '--blue': '#7aa2f7',
                    '--green': '#9ece6a', '--red': '#f7768e', '--mauve': '#bb9af7',
                    '--peach': '#ff9e64', '--yellow': '#e0af68', '--teal': '#73daca',
                    '--pink': '#f7768e', '--lavender': '#7aa2f7', '--border': '#343b58',
                }
            },
            solarized: {
                label: 'Solarized Dark',
                dot: '#268bd2',
                vars: {
                    '--bg': '#002b36', '--bg-dark': '#001e27', '--surface': '#073642',
                    '--surface-bright': '#0a4554', '--text': '#839496', '--text-dim': '#586e75',
                    '--subtext': '#4a6068', '--overlay': '#93a1a1', '--blue': '#268bd2',
                    '--green': '#859900', '--red': '#dc322f', '--mauve': '#6c71c4',
                    '--peach': '#cb4b16', '--yellow': '#b58900', '--teal': '#2aa198',
                    '--pink': '#d33682', '--lavender': '#268bd2', '--border': '#073642',
                }
            },
        };

        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const hint = document.getElementById('hint');
        const sendBtn = document.getElementById('sendBtn');
        const voiceList = document.getElementById('voiceList');
        const nameInput = document.getElementById('nameInput');
        const themeList = document.getElementById('themeList');
        const topbarName = document.getElementById('topbarName');
        const topbarVoice = document.getElementById('topbarVoice');
        const topbarConfig = document.getElementById('topbarConfig');
        const cfgLang = document.getElementById('cfgLang');
        const cfgSteps = document.getElementById('cfgSteps');
        const cfgSpeed = document.getElementById('cfgSpeed');
        const cfgTextSpeed = document.getElementById('cfgTextSpeed');
        const btnSave = document.getElementById('btnSave');
        const btnReset = document.getElementById('btnReset');
        const themeStyle = document.getElementById('themeStyle');

        let busy = false;
        let voices = {};
        let cfg = {};
        let textSpeed = 20;
        let assistantName = 'JARVIS';
        let currentAudio = null;
        let currentWave = null;

        function time() { return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' }); }
        function scroll() { messages.scrollTop = messages.scrollHeight; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function toggleSection(header) {
            header.classList.toggle('collapsed');
            header.nextElementSibling.classList.toggle('collapsed');
        }

        function applyTheme(name) {
            const theme = THEMES[name];
            if (!theme) return;
            const css = Object.entries(theme.vars).map(([k, v]) => `${k}: ${v};`).join('\n');
            themeStyle.textContent = `:root { ${css} }`;
        }

        function updateTopbar() {
            topbarName.textContent = assistantName;
            topbarVoice.textContent = cfg.voice;
            topbarConfig.textContent = `steps:${cfg.steps} speed:${cfg.speed}`;
        }

        function renderVoices() {
            voiceList.innerHTML = '';
            for (const [id, v] of Object.entries(voices)) {
                const item = document.createElement('div');
                item.className = 'voice-item';

                const idEl = document.createElement('span');
                idEl.className = 'voice-id' + (id === cfg.voice ? ' active' : '');
                idEl.textContent = id;
                idEl.addEventListener('click', () => setVoice(id));

                const nameEl = document.createElement('span');
                nameEl.className = 'voice-name';
                nameEl.textContent = v.name;

                const descRow = document.createElement('div');
                descRow.className = 'voice-desc-row';

                const descEl = document.createElement('span');
                descEl.className = 'voice-desc';
                descEl.textContent = v.desc;

                const editBtn = document.createElement('button');
                editBtn.className = 'voice-edit';
                editBtn.textContent = 'edit';
                editBtn.addEventListener('click', () => startEditDesc(id, descRow, descEl, v.desc));

                descRow.appendChild(descEl);
                descRow.appendChild(editBtn);
                item.appendChild(idEl);
                item.appendChild(nameEl);
                item.appendChild(descRow);
                voiceList.appendChild(item);
            }
        }

        function startEditDesc(id, row, descEl, current) {
            const existing = row.querySelector('.voice-desc-input');
            if (existing) return;

            const inp = document.createElement('input');
            inp.className = 'voice-desc-input';
            inp.value = current;

            descEl.replaceWith(inp);
            inp.focus();
            inp.select();

            const save = () => {
                const val = inp.value.trim() || current;
                voices[id].desc = val;
                fetch(`/api/voice/${id}/desc`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ desc: val })
                });
                renderVoices();
            };

            inp.addEventListener('blur', save);
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') inp.blur();
                if (e.key === 'Escape') renderVoices();
            });
        }

        function renderThemes() {
            themeList.innerHTML = '';
            for (const [id, t] of Object.entries(THEMES)) {
                const item = document.createElement('div');
                item.className = 'theme-item' + (id === cfg.theme ? ' active' : '');
                item.innerHTML = `<span class="theme-dot" style="background:${t.dot}"></span><span>${t.label}</span>`;
                item.addEventListener('click', () => setTheme(id));
                themeList.appendChild(item);
            }
        }

        async function setTheme(id) {
            cfg.theme = id;
            applyTheme(id);
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: id })
            });
            renderThemes();
        }

        async function setVoice(id) {
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ voice: id })
            });
            await loadConfig();
            addSys(`voice → ${id} (${voices[id].name})`);
        }

        async function loadConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            voices = data.voices;
            cfg = { ...data };
            delete cfg.voices;

            assistantName = cfg.name || 'JARVIS';
            textSpeed = cfg.text_speed || 20;

            nameInput.value = assistantName;
            cfgLang.value = cfg.lang;
            cfgSteps.value = cfg.steps;
            cfgSpeed.value = cfg.speed;
            cfgTextSpeed.value = textSpeed;

            applyTheme(cfg.theme || 'catppuccin');
            updateTopbar();
            renderVoices();
            renderThemes();
        }

        nameInput.addEventListener('blur', async () => {
            const name = nameInput.value.trim();
            if (!name || name === assistantName) { nameInput.value = assistantName; return; }
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            assistantName = name;
            updateTopbar();
            addSys(`name → ${name}`);
        });

        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });

        btnSave.addEventListener('click', async () => {
            const steps = parseInt(cfgSteps.value);
            const speed = parseFloat(cfgSpeed.value);
            const tSpeed = parseInt(cfgTextSpeed.value);
            if (steps < 5 || steps > 12) { cfgSteps.value = cfg.steps; return; }
            if (speed < 0.7 || speed > 2.0) { cfgSpeed.value = cfg.speed; return; }

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lang: cfgLang.value, steps, speed, text_speed: tSpeed })
            });
            await loadConfig();
            addSys('config saved');
        });

        btnReset.addEventListener('click', async () => {
            await fetch('/api/config/reset', { method: 'POST' });
            await loadConfig();
            addSys('config reset');
        });

        // Auto-expand textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        async function boot() {
            await loadConfig();

            const lines = [
                { t: `  ${assistantName} tts v1.0`, c: 'boot-info', d: 60 },
                { t: `  voice: ${cfg.voice} (${voices[cfg.voice].name})`, c: '', d: 100 },
                { t: `  steps: ${cfg.steps}  speed: ${cfg.speed}  text: ${textSpeed}ms`, c: '', d: 100 },
                { t: `  theme: ${cfg.theme || 'catppuccin'}`, c: '', d: 80 },
                { t: '', c: '', d: 60 },
                { t: `  ready. type a message to begin.`, c: 'boot-ok', d: 150 },
            ];

            for (const l of lines) {
                await new Promise(r => setTimeout(r, l.d));
                const line = document.createElement('div');
                line.className = `boot-line ${l.c}`;
                line.textContent = l.t;
                messages.appendChild(line);
                scroll();
            }

            input.focus();
        }

        function addUser(text) {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-user">you</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="msg-body user-body">${esc(text)}</div>
            `;
            messages.appendChild(m);
            scroll();
        }

        function addSys(text) {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-sys">sys</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="msg-body" style="color:var(--green)">${esc(text)}</div>
            `;
            messages.appendChild(m);
            scroll();
        }

        function typeText(el, text) {
            return new Promise(resolve => {
                let i = 0;
                const cur = document.createElement('span');
                cur.className = 'cursor-blink';
                el.appendChild(cur);

                function type() {
                    if (i < text.length) {
                        el.insertBefore(document.createTextNode(text[i]), cur);
                        i++;
                        scroll();
                        setTimeout(type, textSpeed + Math.random() * (textSpeed * 0.5));
                    } else {
                        setTimeout(() => { cur.remove(); resolve(); }, 300);
                    }
                }
                type();
            });
        }

        async function showThinking() {
            const m = document.createElement('div');
            m.className = 'msg';
            m.id = 'thinking';
            m.innerHTML = `
                <div class="msg-header">
                    <span class="msg-role role-ai">${assistantName.toLowerCase()}</span>
                    <span class="msg-time">${time()}</span>
                </div>
                <div class="thinking">
                    <div class="thinking-line">
                        <div class="thinking-spinner"><span></span><span></span><span></span></div>
                        <span>synthesizing...</span>
                    </div>
                    <div id="log"></div>
                </div>
            `;
            messages.appendChild(m);
            scroll();

            const logs = [
                { t: `  voice: ${cfg.voice}  steps: ${cfg.steps}  speed: ${cfg.speed}`, c: 'log-info', d: 150 },
                { t: '  encoding → diffusion → waveform', c: 'log-info', d: 300 },
                { t: '  ✓ audio ready', c: 'log-ok', d: 100 },
            ];

            const logEl = document.getElementById('log');
            for (const l of logs) {
                await new Promise(r => setTimeout(r, l.d));
                const line = document.createElement('div');
                line.className = `log-line ${l.c}`;
                line.textContent = l.t;
                logEl.appendChild(line);
                scroll();
            }
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function wave() {
            const w = document.createElement('span');
            w.className = 'wave playing';
            for (let i = 0; i < 7; i++) {
                const b = document.createElement('i');
                w.appendChild(b);
            }
            return w;
        }

        function audioControls(audio, waveEl) {
            const ctrls = document.createElement('span');
            ctrls.className = 'audio-controls';

            const playBtn = document.createElement('button');
            playBtn.className = 'audio-btn';
            playBtn.textContent = '▶';
            playBtn.title = 'play';

            const pauseBtn = document.createElement('button');
            pauseBtn.className = 'audio-btn';
            pauseBtn.textContent = '❚❚';
            pauseBtn.title = 'pause';

            const stopBtn = document.createElement('button');
            stopBtn.className = 'audio-btn';
            stopBtn.textContent = '■';
            stopBtn.title = 'stop';

            playBtn.addEventListener('click', () => {
                audio.play();
                waveEl.classList.replace('paused', 'playing');
            });

            pauseBtn.addEventListener('click', () => {
                audio.pause();
                waveEl.classList.replace('playing', 'paused');
            });

            stopBtn.addEventListener('click', () => {
                audio.pause();
                audio.currentTime = 0;
                waveEl.classList.replace('playing', 'paused');
            });

            audio.onended = () => {
                waveEl.classList.replace('playing', 'paused');
            };

            ctrls.appendChild(playBtn);
            ctrls.appendChild(pauseBtn);
            ctrls.appendChild(stopBtn);
            return ctrls;
        }

        async function send() {
            const text = input.value.trim();
            if (!text || busy) return;

            busy = true;
            input.disabled = true;
            sendBtn.disabled = true;
            hint.textContent = 'processing...';

            addUser(text);
            input.value = '';
            input.style.height = 'auto';
            await showThinking();

            try {
                const res = await fetch('/api/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();

                if (data.error) {
                    removeThinking();
                    addSys(`error: ${data.error}`);
                    return;
                }

                removeThinking();

                const audio = new Audio(data.audio);
                audio.play();

                const m = document.createElement('div');
                m.className = 'msg';
                m.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-role role-ai">${assistantName.toLowerCase()}</span>
                        <span class="msg-time">${time()}</span>
                        <span class="badge">${data.duration.toFixed(1)}s</span>
                    </div>
                    <div class="msg-body"></div>
                `;
                messages.appendChild(m);
                scroll();

                const body = m.querySelector('.msg-body');
                const w = wave();
                const ctrls = audioControls(audio, w);
                body.appendChild(w);
                body.appendChild(ctrls);

                typeText(body, text);

            } catch (err) {
                removeThinking();
                addSys(`error: ${err.message}`);
            } finally {
                busy = false;
                input.disabled = false;
                sendBtn.disabled = false;
                hint.textContent = 'enter to send';
                input.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        boot();
    </script>
</body>
</html>
